# File: .github/workflows/ci-cd.yml
name: Main Server CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ci:
    name: Build & Test
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Cache NuGet packages để build nhanh hơn
      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        run: dotnet restore ShortenUrlWeb.csproj

      - name: Build
        run: dotnet build ShortenUrlWeb.csproj --configuration Release --no-restore

      # Bỏ comment khi có Unit Test
      # - name: Test
      #   run: dotnet test --no-build --configuration Release --verbosity normal

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    # Chỉ deploy khi push thẳng vào main (không deploy khi chỉ mở PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_MAIN_SERVER }}

    steps:
      - name: Trigger Render Deploy
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${RENDER_DEPLOY_HOOK_URL}")
          if [ "$RESPONSE" != "200" ]; then
            echo "Render deploy hook trả về HTTP $RESPONSE — deploy có thể thất bại."
            exit 1
          fi
          echo "Render deploy hook kích hoạt thành công (HTTP $RESPONSE)."

      - name: Write Deployment Summary
        run: |
          echo "### 🚀 Main Server Deployed" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
